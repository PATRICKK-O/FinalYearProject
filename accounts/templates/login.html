{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no"/>
  <title>Login - PSMRS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
    }

    .bg-container {
      position: relative;
      background: url("{% static 'img/hero2.jpg' %}") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
    }

    .bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(18, 24, 32, 0.6);
      z-index: 1;
    }

    .login-wrapper {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(1rem, 4vw, 2rem);
    }

    .login-card {
      background-color: rgba(18, 24, 32, 0.95);
      padding: clamp(1.5rem, 5vw, 2.5rem);
      border-radius: 15px;
      width: 100%;
      max-width: min(90%, 400px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      color: #fff;
      animation: fadeIn 0.6s ease;
    }

    .login-card h3 {
      text-align: center;
      margin-bottom: clamp(1rem, 3vw, 1.25rem);
      font-size: clamp(1.2rem, 4vw, 1.5rem);
    }

    .form-control {
      background-color: #1e1e2f;
      border: 1px solid #444;
      color: #f1f1f1;
      border-radius: 6px;
      padding: clamp(0.5rem, 2vw, 0.7rem);
      font-size: clamp(0.85rem, 2.5vw, 0.95rem);
    }

    .form-control:focus {
      background-color: #1e1e2f;
      color: #fff;
      border-color: #28a745;
      box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
    }

    .btn-login {
      width: 100%;
      background-color: #28a745;
      border: none;
      padding: clamp(0.5rem, 2vw, 0.625rem);
      font-weight: bold;
      margin-top: 0.625rem;
      transition: 0.3s ease;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
    }

    .btn-login:hover {
      background-color: #218838;
      transform: translateY(-2px);
    }

    .login-footer {
      text-align: center;
      margin-top: clamp(0.8rem, 2.5vw, 0.9375rem);
      font-size: clamp(0.8rem, 2.5vw, 0.9rem);
    }

    .login-footer a {
      color: #28a745;
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: "Lobster", sans-serif;
      font-size: clamp(1.8rem, 6vw, 2.625rem);
      font-weight: bold;
      text-shadow: 
        0 0 15px rgba(126, 245, 138, 0.6),
        0 0 25px rgba(126, 245, 138, 0.4),
        0 0 35px rgba(126, 245, 138, 0.2);
      background: linear-gradient(135deg, #7ef58a 0%, #4ade80 50%, #22c55e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s ease;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: clamp(1.25rem, 4vw, 1.875rem);
    }

    .logo::before {
      content: '';
      position: absolute;
      top: -10px;
      left: -15px;
      right: -15px;
      bottom: -10px;
      background: linear-gradient(135deg, #7ef58a 0%, #4ade80 50%, #22c55e 100%);
      border-radius: 12px;
      opacity: 0.1;
      z-index: -1;
      transform: scale(0.8);
      transition: all 0.3s ease;
    }

    .logo:hover {
      transform: translateY(-3px);
      text-shadow: 
        0 0 20px rgba(126, 245, 138, 0.8),
        0 0 30px rgba(126, 245, 138, 0.6),
        0 0 40px rgba(126, 245, 138, 0.4);
    }

    .logo:hover::before {
      transform: scale(1);
      opacity: 0.2;
    }

    .logo .logo-icon {
      font-size: clamp(1.5rem, 5vw, 2.375rem);
      animation: pulse 2s infinite;
      color: #7ef58a;
      text-shadow: 
        0 0 10px rgba(126, 245, 138, 0.5),
        0 0 20px rgba(126, 245, 138, 0.3);
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    /* Media Queries for Responsiveness */
    @media (max-width: 576px) {
      .login-card {
        max-width: 95%;
        padding: clamp(1rem, 4vw, 1.5rem);
      }

      .form-label {
        font-size: clamp(0.8rem, 2.5vw, 0.9rem);
      }

      .btn-login {
        padding: clamp(0.4rem, 2vw, 0.5rem);
      }
    }

    @media (max-width: 400px) {
      .logo {
        font-size: clamp(1.5rem, 5vw, 2rem);
      }

      .logo .logo-icon {
        font-size: clamp(1.2rem, 4vw, 1.8rem);
      }
    }
  </style>
</head>
<body>
  <div class="bg-container">
    <div class="bg-overlay"></div>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="logo">
          <i class="fas fa-graduation-cap logo-icon"></i>
          <strong>STUDEX</strong>
        </div>
        <h3>Log In</h3>
        <form action="/accounts/login/" method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" name="user_name" id="username" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" name="password" id="password" class="form-control" required>
          </div>

          {% if messages %}
            {% for message in messages %}
              <div class="text-danger text-center mb-2" style="font-size: clamp(0.75rem, 2.5vw, 0.85rem);">{{ message }}</div>
            {% endfor %}
          {% endif %}

          <button type="submit" class="btn btn-login">Login</button>
        </form>

        <div class="login-footer">
          Don't have an account? <a href="{% url 'register' %}">Register here</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
